<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Control de Inventario y Gastos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tab-button.active { border-bottom-color: #3b82f6; color: #1e40af; font-weight: 600; }
        #labels-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 1cm; width: 100%; max-width: 21cm; background-color: white; margin: 2rem auto; border-radius: 8px; }
        .label { border: 1px dashed #9ca3af; padding: 12px; border-radius: 8px; font-size: 0.75rem; line-height: 1.4; }
        @media print { #main-form-container, .non-printable { display: none !important; } #print-area { margin: 0; padding: 0; } .label { border: 1px solid #000; page-break-inside: avoid; } }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen p-4">
    
    <div id="main-form-container" class="bg-white shadow-2xl rounded-xl p-6 md:p-10 w-full max-w-4xl mx-auto">
        <header class="mb-6 text-center">
            <h1 class="text-3xl md:text-4xl font-bold text-slate-700">🍯 Control de Negocio</h1>
        </header>

        <div class="border-b border-slate-200 mb-6 overflow-x-auto">
            <nav class="flex -mb-px space-x-4 min-w-max">
                <button id="tabInventoryBtn" class="tab-button active whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm">Movimientos</button>
                <button id="tabExpenseBtn" class="tab-button whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm text-slate-500 hover:text-slate-700">Gastos</button>
                <button id="tabClientsBtn" class="tab-button whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm text-slate-500 hover:text-slate-700">Comercios</button>
                <button id="tabLabelsBtn" class="tab-button whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm text-slate-500 hover:text-slate-700">Etiquetas</button>
            </nav>
        </div>

        <div id="inventoryContent">
            <form id="inventoryForm">
                <input type="hidden" name="formType" value="inventory">
                <div class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-3">Tipo de Operación:</label>
                        <div class="flex flex-wrap gap-4">
                            <label class="inline-flex items-center cursor-pointer bg-white border border-slate-200 rounded-lg p-3 shadow-sm">
                                <input type="radio" name="mainMovementType" value="Ingreso" checked class="form-radio h-5 w-5 text-sky-600">
                                <span class="ml-2 text-slate-700 font-medium">Ingreso</span>
                            </label>
                            <label class="inline-flex items-center cursor-pointer bg-white border border-slate-200 rounded-lg p-3 shadow-sm">
                                <input type="radio" name="mainMovementType" value="Venta" class="form-radio h-5 w-5 text-sky-600">
                                <span class="ml-2 text-slate-700 font-medium">Venta</span>
                            </label>
                            <label class="inline-flex items-center cursor-pointer bg-white border border-slate-200 rounded-lg p-3 shadow-sm">
                                <input type="radio" name="mainMovementType" value="ConsignacionSalida" class="form-radio h-5 w-5 text-sky-600">
                                <span class="ml-2 text-slate-700 font-medium">Consigna</span>
                            </label>
                            <label class="inline-flex items-center cursor-pointer bg-white border border-slate-200 rounded-lg p-3 shadow-sm">
                                <input type="radio" name="mainMovementType" value="GestionarConsigna" class="form-radio h-5 w-5 text-sky-600">
                                <span class="ml-2 text-slate-700 font-medium">Gestión</span>
                            </label>
                        </div>
                    </div>

                    <div id="formIngreso" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Producto:</label>
                            <div class="flex items-center space-x-3">
                                <select id="productoIngreso" name="producto" class="w-full p-3 border border-slate-300 rounded-lg shadow-sm"></select>
                                <div id="stockIngreso" class="text-right text-sm text-slate-500 font-semibold w-24"></div>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Cantidad:</label>
                                <input type="number" id="cantidadIngreso" class="w-full p-3 border rounded-lg border-slate-300 shadow-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Costo Unitario ($):</label>
                                <input type="number" id="costoIngreso" step="0.01" placeholder="0.00" class="w-full p-3 border rounded-lg border-slate-300 shadow-sm">
                            </div>
                        </div>
                    </div>

                    <div id="formVenta" class="hidden space-y-6">
                        <div id="destinoVentaContainer" class="bg-yellow-50 border border-yellow-100 p-4 rounded-lg">
                            <label class="block text-sm font-medium text-yellow-800 mb-2">Destino:</label>
                            <div class="flex gap-4">
                                <label class="flex items-center cursor-pointer"><input type="radio" name="ventaDestino" value="Delivery" checked><span class="ml-2 text-sm">Delivery</span></label>
                                <label class="flex items-center cursor-pointer"><input type="radio" name="ventaDestino" value="Comercio"><span class="ml-2 text-sm">Comercio</span></label>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div id="divNombreCliente"><label class="block text-sm font-medium text-slate-700">Cliente:</label><input type="text" id="nombreClienteDelivery" class="w-full p-3 border rounded-lg border-slate-300"></div>
                            <div id="divComercioSelect" class="hidden">
                                <label class="block text-sm font-medium text-slate-700">Comercio:</label>
                                <select id="clienteComercio" class="w-full p-3 border rounded-lg border-slate-300 bg-white shadow-sm"></select>
                            </div>
                            <div><label class="block text-sm font-medium text-slate-700" id="lblFactura">Referencia/Factura:</label><input type="text" id="numeroFactura" class="w-full p-3 border rounded-lg border-slate-300"></div>
                        </div>
                        <div class="flex items-center p-3 bg-blue-50 rounded-lg border border-blue-100" id="divMuestra">
                            <input type="checkbox" id="esMuestra" class="h-5 w-5 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
                            <label for="esMuestra" class="ml-2 block text-sm font-semibold text-blue-800 uppercase tracking-wide">Registrar como Muestra (Sin Cobro)</label>
                        </div>
                        <div id="containerExtrasVenta" class="space-y-4">
                            <div class="bg-slate-50 p-4 rounded-lg border border-slate-200 shadow-sm flex flex-wrap gap-4 items-center">
                                <label class="flex items-center cursor-pointer"><input type="checkbox" id="pagoConPOS" class="h-4 w-4 text-sky-600 rounded"><span class="ml-2 text-sm font-medium">Pago POS</span></label>
                                <div id="posFields" class="hidden"><label class="text-xs font-semibold">% Comisión:</label><input type="number" id="comisionPOS" value="3.5" step="0.01" class="w-16 p-1 border border-slate-300 ml-2 rounded"></div>
                                <label class="flex items-center cursor-pointer border-l pl-4 border-slate-300"><input type="checkbox" id="aplicaRetencionVenta" class="h-4 w-4 text-sky-600 rounded"><span class="ml-2 text-sm font-medium text-red-600 font-bold">Retención 1% (GC)</span></label>
                            </div>
                            <div class="bg-slate-50 p-4 rounded-lg border border-slate-200 shadow-sm">
                                <label class="flex items-center cursor-pointer"><input type="checkbox" id="incluyeDelivery" class="h-4 w-4 text-sky-600 rounded"><span class="ml-2 text-sm font-medium">Delivery</span></label>
                                <div id="deliveryFields" class="hidden mt-2"><label class="text-xs font-semibold">Monto $:</label><input type="number" id="montoDelivery" step="0.01" class="w-24 p-2 border border-slate-300 ml-2 rounded"></div>
                            </div>
                        </div>
                        <div id="productLines" class="space-y-4 border-t border-b py-4 border-slate-200"></div>
                        <div class="flex justify-between items-center"><button type="button" id="addProductBtn" class="bg-slate-200 hover:bg-slate-300 p-2 rounded-lg font-medium transition-colors">+ Producto</button><div class="text-right font-bold text-xl text-slate-800" id="saleTotal">$0.00</div></div>
                    </div>

                    <div id="formGestionConsigna" class="hidden space-y-6">
                        <div class="flex justify-between items-center"><h3 class="font-semibold text-slate-700">Consignas Activas</h3><button type="button" id="refreshConsignasBtn" class="text-sky-600 font-bold hover:text-sky-800">Actualizar ↻</button></div>
                        <select id="consignaSelect" class="w-full p-3 border rounded-lg border-slate-300 shadow-sm"><option value="">Cargando...</option></select>
                        <div id="consignaDetails" class="hidden p-4 bg-yellow-50 rounded-lg border border-yellow-200 text-sm shadow-sm">
                            <p><strong>Fecha:</strong> <span id="consFecha"></span></p>
                            <p><strong>Producto:</strong> <span id="consProd"></span></p>
                            <p><strong>Pendiente:</strong> <span id="consQty"></span></p>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-xs font-bold text-slate-600 uppercase">Facturar (Vendidas):</label><input type="number" id="cantVentaConsigna" class="w-full p-3 border border-slate-300 rounded-lg shadow-sm" placeholder="0"></div>
                            <div><label class="text-xs font-bold text-slate-600 uppercase">Devolver (Bodega):</label><input type="number" id="cantDevolucionConsigna" class="w-full p-3 border border-slate-300 rounded-lg shadow-sm" placeholder="0"></div>
                        </div>
                        <!-- Campos de Precio para Liquidación -->
                        <div id="consignaPrecioFields" class="hidden bg-slate-50 p-4 rounded-lg border border-slate-200 space-y-3">
                             <div class="grid grid-cols-2 gap-4">
                                <div><label class="text-xs font-bold">Precio Unitario:</label><input type="number" id="precioUnitarioConsigna" step="0.01" class="w-full p-2 border rounded border-slate-300"></div>
                                <div>
                                    <label class="text-xs font-bold">Modo IVA:</label>
                                    <select id="modoIVAConsigna" class="w-full p-2 border rounded border-slate-300 bg-white">
                                        <option value="incluido">IVA Inc.</option>
                                        <option value="mas_iva">+ IVA</option>
                                        <option value="exento">Sin IVA</option>
                                    </select>
                                </div>
                             </div>
                             <div class="flex flex-wrap gap-4 items-center pt-2 border-t border-slate-200">
                                <label class="flex items-center cursor-pointer"><input type="checkbox" id="posConsigna" class="h-4 w-4 text-sky-600 rounded"><span class="ml-2 text-xs font-semibold">Pago POS</span></label>
                                <div id="posFieldsConsigna" class="hidden"><input type="number" id="comisionPOSConsigna" value="3.5" step="0.01" class="w-16 p-1 border rounded text-xs"></div>
                                <label class="flex items-center cursor-pointer border-l pl-4 border-slate-300"><input type="checkbox" id="aplicaRetencionConsigna" class="h-4 w-4 text-sky-600 rounded"><span class="ml-2 text-xs font-bold text-red-600">Retención 1% (GC)</span></label>
                             </div>
                        </div>
                    </div>
                </div>
                <div class="mt-6">
                    <label class="block text-sm font-medium mb-1 text-slate-700">Descripción / Notas:</label>
                    <textarea id="descripcionGeneralInventario" class="w-full p-3 border border-slate-300 rounded-lg shadow-sm focus:ring-2 focus:ring-sky-500" placeholder="Detalle opcional del movimiento..."></textarea>
                </div>
                <button type="submit" id="btnSubmitInventory" class="w-full mt-6 bg-sky-600 text-white p-4 rounded-lg font-bold shadow-lg hover:bg-sky-700 transition-all flex justify-center items-center disabled:opacity-50 disabled:cursor-not-allowed">
                    <span>Procesar Operación</span>
                </button>
            </form>
        </div>
        
        <div id="expenseContent" class="hidden">
            <form id="expenseForm" class="space-y-4">
                <input type="hidden" name="formType" value="expense">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Tipo de Gasto:</label>
                    <select id="tipoGasto" name="tipoGasto" class="w-full p-3 border border-slate-300 rounded-lg shadow-sm bg-white">
                        <option value="Salarios">Salarios</option>
                        <option value="Insumos">Insumos</option>
                        <option value="Delivery">Delivery</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Publicidad">Publicidad</option>
                        <option value="Otros">Otros</option>
                    </select>
                </div>
                <div id="divGastoOtros" class="hidden">
                    <label class="block text-xs font-bold text-slate-600 uppercase mb-1">Especifique el Gasto:</label>
                    <input type="text" id="tipoGastoOtros" name="tipoGastoOtros" class="w-full p-3 border border-slate-300 rounded-lg shadow-sm" placeholder="Ej: Mantenimiento local">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Valor $:</label>
                        <input type="number" id="valorGasto" name="valorGasto" step="0.01" placeholder="0.00" class="w-full p-3 border border-slate-300 rounded-lg shadow-sm">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Modo IVA:</label>
                        <select id="modoIVAGasto" name="modoIVA" class="w-full p-3 border border-slate-300 rounded-lg shadow-sm bg-white">
                            <option value="incluido">IVA Incluido</option>
                            <option value="mas_iva">+ Calcular IVA</option>
                            <option value="exento">Sin IVA (Exento)</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Método de Pago:</label>
                    <div class="flex gap-4 p-2 bg-slate-50 rounded-lg border border-slate-200">
                        <label class="flex items-center cursor-pointer"><input type="radio" name="metodoPago" value="Efectivo" checked class="mr-2"> <span class="text-sm">Efectivo</span></label>
                        <label class="flex items-center cursor-pointer"><input type="radio" name="metodoPago" value="Tarjeta" class="mr-2"> <span class="text-sm">Tarjeta</span></label>
                    </div>
                </div>
                <!-- CAMPO DE DESCRIPCIÓN PARA GASTOS -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Descripción / Notas:</label>
                    <textarea name="descripcionGasto" placeholder="Detalles adicionales del gasto..." class="w-full p-3 border border-slate-300 rounded-lg shadow-sm"></textarea>
                </div>
                <button type="submit" class="w-full bg-sky-600 text-white p-4 rounded-lg font-bold shadow-md hover:bg-sky-700 transition-colors uppercase tracking-wider">Registrar Gasto</button>
            </form>
        </div>

        <div id="clientsContent" class="hidden"><form id="clientForm" class="space-y-4"><input type="hidden" name="formType" value="client"><input type="text" name="nombreComercio" required placeholder="Nombre Comercio" class="w-full p-3 border border-slate-300 rounded-lg shadow-sm"><button type="submit" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold shadow-md hover:bg-green-700 transition-colors">Guardar Comercio</button></form></div>
        <div id="labelsContent" class="hidden"><form id="label-form" class="space-y-4"><input type="text" id="labelName" placeholder="Nombre" required class="w-full p-2 border rounded border-slate-300"><input type="tel" id="labelPhone" placeholder="Teléfono" required class="w-full p-2 border rounded border-slate-300"><textarea id="labelAddress" placeholder="Dirección" class="w-full p-2 border rounded border-slate-300"></textarea><div id="label-products-list" class="space-y-2"></div><button type="button" id="add-label-product-btn" class="text-sky-600 text-xs font-bold hover:text-sky-800">+ Producto</button><input type="number" id="labelPrice" step="0.01" placeholder="Total $" class="w-full p-2 border rounded border-slate-300"><button type="submit" class="w-full bg-sky-600 text-white p-2 rounded font-bold shadow-md hover:bg-sky-700 transition-colors">Generar Etiqueta</button></form></div>

        <div class="flex flex-col items-center justify-center space-y-3 mt-6">
            <div id="loader" class="loader"></div>
            <div id="message" class="text-sm p-3 rounded-lg hidden w-full text-center font-medium border"></div>
        </div>
    </div>

    <div id="action-buttons" class="hidden max-w-4xl mx-auto mt-4 flex gap-4 non-printable"><button id="print-btn" class="flex-1 bg-green-600 text-white p-3 rounded-lg font-bold shadow-md hover:bg-green-700">Imprimir Etiquetas</button><button id="clear-btn" class="flex-1 bg-red-600 text-white p-3 rounded-lg font-bold shadow-md hover:bg-red-700">Limpiar</button></div>
    <div id="print-area"><div id="labels-container"></div></div>

    <template id="productOptionsTemplate">
        <option value="" disabled selected>Selecciona producto...</option>
        <option value="Miel Picante Baja botella 350 g">Miel Picante Baja 350g</option>
        <option value="Miel Picante Media botella 350 g">Miel Picante Media 350g</option>
        <option value="Miel Picante Alta botella 350 g">Miel Picante Alta 350g</option>
        <option value="Miel Picante Baja sachet">Miel Picante Baja sachet</option>
        <option value="Miel Picante Media sachet">Miel Picante Media sachet</option>
        <option value="Miel Picante Alta sachet">Miel Picante Alta sachet</option>
        <option value="Miel Picante Baja galón">Miel Picante Baja galón</option>
        <option value="Miel Picante Media galón">Miel Picante Media galón</option>
        <option value="Miel Picante Alta galón">Miel Picante Alta galón</option>
    </template>

    <script>
        const FULL_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxMapJvU3t9B7c0sfZIQRJbjPZpqjVVQCF9gsJrQd4evSVDCeNnPKlRfdkPLoxkZE8JyA/exec';
        const IVA_RATE = 0.13;
        const RETENCION_RATE = 0.01;
        
        function showMessage(msg, type) {
            const m = document.getElementById('message');
            m.textContent = msg;
            m.className = `text-sm p-3 rounded-lg block w-full text-center font-medium ${type === 'success' ? 'bg-green-100 text-green-700 border-green-200' : 'bg-red-100 text-red-700 border-red-200'}`;
            m.classList.remove('hidden');
            setTimeout(() => m.classList.add('hidden'), 6000);
        }

        function switchTab(tab) {
            ['inventory', 'expense', 'clients', 'labels'].forEach(t => {
                const content = document.getElementById(t + 'Content');
                const btn = document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1) + 'Btn');
                if(content) content.classList.add('hidden');
                if(btn) btn.classList.remove('active');
            });
            const activeContent = document.getElementById(tab + 'Content');
            const activeBtn = document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1) + 'Btn');
            if(activeContent) activeContent.classList.remove('hidden');
            if(activeBtn) activeBtn.classList.add('active');
            document.getElementById('action-buttons').classList.toggle('hidden', tab !== 'labels');
        }
        
        ['Inventory', 'Expense', 'Clients', 'Labels'].forEach(t => {
            const btn = document.getElementById('tab' + t + 'Btn');
            if(btn) btn.addEventListener('click', () => switchTab(t.toLowerCase()));
        });

        async function loadClients() {
            const sel = document.getElementById('clienteComercio'); 
            if(!sel) return;
            sel.innerHTML = '<option value="">Cargando comercios...</option>';
            try {
                const res = await fetch(`${FULL_SCRIPT_URL.trim()}?action=getClients`);
                const json = await res.json();
                if (json.success && json.clients && json.clients.length > 0) {
                    sel.innerHTML = '<option value="" disabled selected>Seleccione comercio...</option>';
                    json.clients.forEach(c => {
                        const opt = document.createElement('option');
                        opt.value = c; opt.textContent = c; sel.appendChild(opt);
                    });
                } else sel.innerHTML = '<option value="" disabled>No hay comercios registrados</option>';
            } catch(e) { sel.innerHTML = '<option value="" disabled>Error al conectar</option>'; }
        }

        const movementRadios = document.getElementsByName('mainMovementType');
        movementRadios.forEach(r => r.addEventListener('change', () => {
            const checked = document.querySelector('input[name="mainMovementType"]:checked');
            if(!checked) return;
            const val = checked.value;
            document.getElementById('formIngreso').classList.toggle('hidden', val !== 'Ingreso');
            document.getElementById('formVenta').classList.toggle('hidden', val !== 'Venta' && val !== 'ConsignacionSalida');
            document.getElementById('formGestionConsigna').classList.toggle('hidden', val !== 'GestionarConsigna');
            if (val === 'GestionarConsigna') loadConsignments();
            if ((val === 'Venta' || val === 'ConsignacionSalida') && document.getElementById('productLines').children.length === 0) addProductLine();
            const destRadio = document.querySelector('input[name="ventaDestino"]:checked');
            if (destRadio && destRadio.value === 'Comercio') loadClients();
        }));

        async function fetchStock(prod, el) {
            if (!prod) return;
            el.textContent = '...';
            try {
                const cleanUrl = FULL_SCRIPT_URL.trim();
                const res = await fetch(`${cleanUrl}?action=getStock&producto=${encodeURIComponent(prod)}`);
                const json = await res.json(); 
                el.textContent = json.success ? `Total: ${json.stock}` : 'Total: 0';
            } catch(e) { el.textContent = 'Err'; }
        }

        function addProductLine() {
            const container = document.getElementById('productLines');
            const div = document.createElement('div');
            div.className = 'product-line grid grid-cols-12 gap-2 border-b pb-2 items-center border-slate-100';
            div.innerHTML = `
                <div class="col-span-12 sm:col-span-4">
                    <select name="producto" class="w-full p-2 border rounded border-slate-300 text-sm">${document.getElementById('productOptionsTemplate').innerHTML}</select>
                    <div class="stock-info text-[10px] text-slate-400 mt-1"></div>
                </div>
                <div class="col-span-4 sm:col-span-2">
                    <input type="number" name="cantidad" placeholder="Cant" class="w-full p-2 border border-slate-300 rounded text-sm">
                </div>
                <div class="col-span-4 sm:col-span-3">
                    <input type="number" name="precioUnitario" placeholder="Precio" step="0.01" class="w-full p-2 border border-slate-300 rounded text-sm">
                </div>
                <div class="col-span-4 sm:col-span-3 flex flex-col gap-1 items-center">
                    <select name="modoIVA" class="w-full p-1 border rounded border-slate-300 text-[10px] bg-slate-50">
                        <option value="incluido">IVA Inc.</option>
                        <option value="mas_iva">+ IVA</option>
                        <option value="exento">Sin IVA</option>
                    </select>
                    <button type="button" class="remove-product-btn text-red-500 font-bold hover:bg-red-50 rounded px-2 mt-1">×</button>
                </div>
            `;
            container.appendChild(div);
            div.querySelector('select[name="producto"]').addEventListener('change', e => fetchStock(e.target.value, div.querySelector('.stock-info')));
            div.querySelector('.remove-product-btn').addEventListener('click', () => { div.remove(); updateSaleTotal(); });
            ['input', 'change'].forEach(evt => div.addEventListener(evt, updateSaleTotal));
        }

        function updateSaleTotal() {
            let subtotalNeto = 0;
            let totalBruto = 0;
            const aplicaRetencion = document.getElementById('aplicaRetencionVenta').checked;

            document.querySelectorAll('.product-line').forEach(l => {
                const q = parseFloat(l.querySelector('[name="cantidad"]').value) || 0;
                const p = parseFloat(l.querySelector('[name="precioUnitario"]').value) || 0;
                const modo = l.querySelector('[name="modoIVA"]').value;
                let neto = 0; let bruto = 0;
                if (modo === 'mas_iva') { neto = q * p; bruto = neto * (1 + IVA_RATE); } 
                else if (modo === 'incluido') { bruto = q * p; neto = bruto / (1 + IVA_RATE); } 
                else { neto = q * p; bruto = neto; }
                subtotalNeto += neto; totalBruto += bruto;
            });

            const retencion = aplicaRetencion ? subtotalNeto * RETENCION_RATE : 0;
            const final = totalBruto - retencion;
            document.getElementById('saleTotal').textContent = `$${final.toFixed(2)}`;
            if(aplicaRetencion) document.getElementById('saleTotal').innerHTML += `<br><span class="text-[10px] text-red-500 font-normal">Ret. GC applied: -$${retencion.toFixed(2)}</span>`;
        }
        
        document.getElementById('aplicaRetencionVenta').addEventListener('change', updateSaleTotal);
        document.getElementById('addProductBtn').addEventListener('click', addProductLine);

        async function loadConsignments() {
            const sel = document.getElementById('consignaSelect'); 
            sel.innerHTML = '<option>Cargando...</option>';
            try {
                const res = await fetch(`${FULL_SCRIPT_URL.trim()}?action=getConsignments`);
                const json = await res.json();
                if (json.success && json.consignments && json.consignments.length > 0) {
                    sel.innerHTML = '<option value="" disabled selected>Seleccione consigna...</option>';
                    json.consignments.forEach(c => {
                        const opt = document.createElement('option');
                        opt.value = JSON.stringify(c); opt.textContent = `[${c.fecha}] ${c.cliente} | ${c.producto}`; sel.appendChild(opt);
                    });
                } else sel.innerHTML = '<option disabled>No hay pendientes</option>';
            } catch(e) { sel.innerHTML = '<option disabled>Error</option>'; }
        }

        document.getElementById('consignaSelect').addEventListener('change', e => {
            if(!e.target.value) return;
            document.getElementById('consignaDetails').classList.remove('hidden');
            document.getElementById('consignaPrecioFields').classList.remove('hidden');
            const data = JSON.parse(e.target.value);
            document.getElementById('consFecha').textContent = data.fecha;
            document.getElementById('consProd').textContent = data.producto;
            document.getElementById('consQty').textContent = data.cantidad;
        });

        document.getElementById('inventoryForm').addEventListener('submit', async e => {
            e.preventDefault();
            const loader = document.getElementById('loader');
            const btn = document.getElementById('btnSubmitInventory');
            loader.style.display = 'block'; btn.disabled = true;
            try {
                const movRadio = document.querySelector('input[name="mainMovementType"]:checked');
                const mov = movRadio.value;
                let data = { formType: 'inventory', tipoMovimiento: mov };
                if (mov === 'Ingreso') {
                    data.producto = document.getElementById('productoIngreso').value;
                    data.cantidad = document.getElementById('cantidadIngreso').value;
                    data.costo = document.getElementById('costoIngreso').value;
                } else if (mov === 'Venta' || mov === 'ConsignacionSalida') {
                    data.productos = Array.from(document.querySelectorAll('.product-line')).map(l => ({ 
                        producto: l.querySelector('[name="producto"]').value, 
                        cantidad: l.querySelector('[name="cantidad"]').value, 
                        precioUnitario: l.querySelector('[name="precioUnitario"]').value, 
                        modoIVA: l.querySelector('[name="modoIVA"]').value 
                    }));
                    data.aplicaRetencion = document.getElementById('aplicaRetencionVenta').checked;
                    const destRadio = document.querySelector('input[name="ventaDestino"]:checked');
                    data.tipoVenta = destRadio.value;
                    data.nombreCliente = mov === 'ConsignacionSalida' ? document.getElementById('numeroFactura').value : (data.tipoVenta === 'Delivery' ? document.getElementById('nombreClienteDelivery').value : document.getElementById('clienteComercio').value);
                    data.numeroFactura = document.getElementById('numeroFactura').value;
                    data.esMuestra = document.getElementById('esMuestra').checked;
                    data.pagoConPOS = document.getElementById('pagoConPOS').checked;
                    data.comisionPOS = document.getElementById('comisionPOS').value || 3.5;
                    data.incluyeDelivery = document.getElementById('incluyeDelivery').checked;
                    data.montoDelivery = document.getElementById('montoDelivery').value || 0;
                } else if (mov === 'GestionarConsigna') {
                    const selVal = document.getElementById('consignaSelect').value;
                    const consData = JSON.parse(selVal);
                    data.idConsigna = consData.id;
                    data.cantidadVenta = document.getElementById('cantVentaConsigna').value || 0;
                    data.cantidadDevolucion = document.getElementById('cantDevolucionConsigna').value || 0;
                    data.precioUnitario = document.getElementById('precioUnitarioConsigna').value || 0;
                    data.modoIVA = document.getElementById('modoIVAConsigna').value;
                    data.pagoConPOS = document.getElementById('posConsigna').checked;
                    data.comisionPOS = document.getElementById('comisionPOSConsigna').value || 3.5;
                    data.aplicaRetencion = document.getElementById('aplicaRetencionConsigna').checked;
                }
                data.descripcionGeneral = document.getElementById('descripcionGeneralInventario').value;
                const response = await fetch(FULL_SCRIPT_URL.trim(), { method: 'POST', body: JSON.stringify(data), redirect: 'follow' });
                const result = await response.json();
                if (result.success) { 
                    showMessage(result.message, 'success');
                    e.target.reset(); document.getElementById('productLines').innerHTML = ''; 
                    document.getElementById('consignaDetails').classList.add('hidden');
                    document.getElementById('consignaPrecioFields').classList.add('hidden');
                    if (mov === 'GestionarConsigna') loadConsignments();
                    toggleInventoryForms();
                } else throw new Error(result.error); 
            } catch(err) { showMessage(err.message, 'error'); } 
            finally { loader.style.display = 'none'; btn.disabled = false; }
        });

        document.querySelectorAll('input[name="ventaDestino"]').forEach(r => r.addEventListener('change', () => {
            const checked = document.querySelector('input[name="ventaDestino"]:checked');
            const isCom = checked ? checked.value === 'Comercio' : false;
            document.getElementById('divNombreCliente').classList.toggle('hidden', isCom);
            document.getElementById('divComercioSelect').classList.toggle('hidden', !isCom);
            if (isCom) loadClients();
        }));

        document.getElementById('pagoConPOS').addEventListener('change', e => document.getElementById('posFields').classList.toggle('hidden', !e.target.checked));
        document.getElementById('posConsigna').addEventListener('change', e => document.getElementById('posFieldsConsigna').classList.toggle('hidden', !e.target.checked));
        document.getElementById('incluyeDelivery').addEventListener('change', e => document.getElementById('deliveryFields').classList.toggle('hidden', !e.target.checked));

        const prodIngreso = document.getElementById('productoIngreso');
        if(prodIngreso) {
            prodIngreso.innerHTML = document.getElementById('productOptionsTemplate').innerHTML;
            prodIngreso.addEventListener('change', e => fetchStock(e.target.value, document.getElementById('stockIngreso')));
        }
        
        function toggleInventoryForms() {
            const checked = document.querySelector('input[name="mainMovementType"]:checked');
            if(!checked) return;
            document.getElementById('formIngreso').classList.toggle('hidden', checked.value !== 'Ingreso');
            document.getElementById('formVenta').classList.toggle('hidden', checked.value !== 'Venta' && checked.value !== 'ConsignacionSalida');
            document.getElementById('formGestionConsigna').classList.toggle('hidden', checked.value !== 'GestionarConsigna');
        }
        toggleInventoryForms();

        document.getElementById('expenseForm').addEventListener('submit', async e => {
            e.preventDefault();
            const loader = document.getElementById('loader'); loader.style.display = 'block';
            try {
                const fd = new FormData(e.target);
                const res = await fetch(FULL_SCRIPT_URL.trim(), { method: 'POST', body: JSON.stringify(Object.fromEntries(fd)), redirect: 'follow' });
                if((await res.json()).success) { showMessage('Gasto registrado', 'success'); e.target.reset(); document.getElementById('divGastoOtros').classList.add('hidden'); }
            } catch(e) { showMessage('Error', 'error'); } 
            finally { loader.style.display = 'none'; }
        });

        document.getElementById('clientForm').addEventListener('submit', async e => {
            e.preventDefault();
            const loader = document.getElementById('loader'); loader.style.display = 'block';
            try {
                const res = await fetch(FULL_SCRIPT_URL.trim(), { method: 'POST', body: JSON.stringify(Object.fromEntries(new FormData(e.target))), redirect: 'follow' });
                if((await res.json()).success) { showMessage('Comercio guardado', 'success'); e.target.reset(); loadClients(); }
            } catch(e) { showMessage('Error', 'error'); } 
            finally { loader.style.display = 'none'; }
        });

        document.getElementById('print-btn').addEventListener('click', () => window.print());
        document.getElementById('clear-btn').addEventListener('click', () => document.getElementById('labels-container').innerHTML = '');
        document.getElementById('tipoGasto').addEventListener('change', e => document.getElementById('divGastoOtros').classList.toggle('hidden', e.target.value !== 'Otros'));
    </script>
</body>
</html>
